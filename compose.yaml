name: mushy-lucek

services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared-lucek
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}

  web:
    image: caddy:2-alpine
    container_name: mushy-lucek-web
    restart: unless-stopped
    volumes:
      - .:/usr/share/caddy
      - ./Caddyfile:/etc/caddy/Caddyfile
